<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco - Blog ODS 8</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/accessibility.css">
</head>
<body>
    <header>
        <h1>Progresso ODS 8</h1>
        <nav aria-label="Menu principal">
            <a href="../index.html">Início</a>
            <a href="sobre.html">Sobre a ODS 8</a>
            <a href="acoes.html">Ações Reais</a>
            <a href="contato.html">Fale Conosco</a>
        </nav>
    </header>

    <main>
        <div class="content-card">
            <h2>Fale Conosco</h2>
            <p>Quer sugerir pautas, relatar iniciativas sobre Trabalho Decente ou entrar em contato com nossa equipe? Preencha o formulário abaixo.</p>
            
            <form id="formContato">
                <div class="form-group">
                    <label for="nome">Seu Nome:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Seu E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição da Mensagem:</label>
                    <textarea id="descricao" name="descricao" rows="6" placeholder="Escreva sua mensagem aqui..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Envie a mensagem</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Blog ODS 8. Desenvolvido por <a href="https://github.com/Joyscout" target="_blank">Joyscout no GitHub</a>.</p>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        // Script exclusivo para a página de contato
        document.getElementById('formContato').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que a página recarregue
            
            // Simula o envio
            alert("Sua mensagem foi enviada com sucesso! Muito obrigado pelo contato.");
            
            // Limpa os inputs após o "envio"
            this.reset();
        });
    </script>
</body>
</html>
